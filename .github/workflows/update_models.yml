name: Update NECBL Pitching Models

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install R and system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            r-base r-base-dev \
            r-cran-tidyverse \
            r-cran-randomforest \
            r-cran-caret \
            r-cran-data.table \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install remaining R packages
        run: |
          sudo R -e "install.packages(c('Metrics','googledrive','gargle','bit64','rsconnect','shiny','shinydashboard','DT','plotly','curl','tidyr'), repos='https://cloud.r-project.org')"

      - name: Delete old RDS files
        run: |
          rm -f necbl_clean_*.rds
          rm -f necbl_stuff_plus_overall_*.rds
          rm -f necbl_stuff_plus_by_pitch_type_*.rds
          rm -f necbl_location_plus_overall_*.rds
          rm -f necbl_location_plus_by_pitch_type_*.rds
          rm -f necbl_pitching_plus_overall_*.rds
          rm -f necbl_pitching_plus_by_pitch_type_*.rds

      - name: Write Google service account key to file
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GDRIVE_SERVICE_ACCOUNT_JSON" > gdrive_key.json

      - name: Run pipeline (Google Drive -> cleaned RDS)
        env:
          GDRIVE_KEY_PATH: gdrive_key.json
        run: sudo -E Rscript pipeline_cleaning.R

      - name: Remove service account key file
        if: always()
        run: rm -f gdrive_key.json

      - name: Run Stuff+ model
        run: sudo -E Rscript stuff_plus.R

      - name: Run Location+ model
        run: sudo -E Rscript location_plus.R

      - name: Run Pitching+ model
        run: sudo -E Rscript pitching_plus.R

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          sudo -E Rscript -e "
            rsconnect::setAccountInfo(
              name   = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token  = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(appDir = '.', appName = 'necblpitchingplusmodel', forceUpdate = TRUE)
          "

      - name: Commit updated RDS files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || \
            git commit -m "Auto-update: models $(date +'%Y-%m-%d')"
          git push
