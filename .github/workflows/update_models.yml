name: Update NECBL Pitching Models

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install R and packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y r-base r-base-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev
          sudo R -e "install.packages('tidyverse', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('randomForest', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('caret', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('Metrics', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('data.table', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('googledrive', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('gargle', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('bit64', repos='https://cloud.r-project.org')"
          sudo R -e "install.packages('rsconnect', repos='https://cloud.r-project.org')"

      - name: Diagnose library paths
        run: |
          echo "=== which R ==="
          which R
          which Rscript
          echo "=== R version ==="
          R --version | head -1
          Rscript --version
          echo "=== sudo Rscript libPaths ==="
          sudo Rscript -e ".libPaths()"
          echo "=== sudo R libPaths ==="
          sudo R -e ".libPaths()"
          echo "=== tidyverse location ==="
          sudo R -e "find.package('tidyverse')"
          echo "=== sudo Rscript tidyverse ==="
          sudo Rscript -e "find.package('tidyverse')"

      - name: Write Google service account key to file
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GDRIVE_SERVICE_ACCOUNT_JSON" > gdrive_key.json

      - name: Run pipeline (Google Drive -> cleaned RDS)
        env:
          GDRIVE_KEY_PATH: gdrive_key.json
        run: sudo Rscript pipeline_cleaning.R

      - name: Remove service account key file
        if: always()
        run: rm -f gdrive_key.json

      - name: Run Stuff+ model
        run: sudo Rscript stuff_plus.R

      - name: Run Location+ model
        run: sudo Rscript location_plus.R

      - name: Run Pitching+ model
        run: sudo Rscript pitching_plus.R

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          sudo Rscript -e "
            rsconnect::setAccountInfo(
              name   = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token  = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(appDir = '.', forceUpdate = TRUE)
          "

      - name: Commit updated RDS files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            necbl_clean_*.rds \
            necbl_stuff_plus_overall_*.rds \
            necbl_stuff_plus_by_pitch_type_*.rds \
            necbl_location_plus_overall_*.rds \
            necbl_location_plus_by_pitch_type_*.rds \
            necbl_pitching_plus_overall_*.rds \
            necbl_pitching_plus_by_pitch_type_*.rds
          git diff --staged --quiet || \
            git commit -m "Auto-update: models $(date +'%Y-%m-%d')"
          git push
